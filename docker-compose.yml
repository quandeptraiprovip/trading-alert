# Chạy cả BOT alert đa-symbol + CHART perpetual bằng Docker.
#
#   docker compose up -d --build      # build + chạy nền
#   docker compose logs -f swing-bot  # xem log bot (tìm dòng "Lắng nghe lệnh Telegram")
#   docker compose down               # dừng
#
# CẦN: file .env.local chứa TELEGRAM_BOT_TOKEN + TELEGRAM_CHAT_ID (xem .env.example).
# LƯU Ý: KHÔNG chạy đồng thời bot này với pm2 swing-bot trên VM cùng 1 token
#        — getUpdates giao mỗi update đúng 1 lần, hai bên sẽ giành /status.
services:
  swing-bot:
    build: .
    image: swing-alert-bot
    container_name: swing-bot
    command: node bot.js
    env_file: .env.local
    environment:
      TZ: Asia/Ho_Chi_Minh
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped

  swing-chart:
    build: .
    image: swing-alert-bot
    container_name: swing-chart
    command: node chart.js
    environment:
      TZ: Asia/Ho_Chi_Minh
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "3847:3847"
    restart: unless-stopped
